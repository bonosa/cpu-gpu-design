<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ZIP 344</title>
<style>
  :root {
    --bg:      #0d0d1a;
    --cell:    #181830;
    --border:  #2a2a50;
    --accent:  #e94560;
    --text:    #d0d0e0;
    --sz:      64px;
    --gap:     4px;
    --stride:  68px; /* sz + gap */
  }

  * { box-sizing: border-box; margin: 0; padding: 0;
      -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: .9rem;
    padding: 1.4rem 1rem;
    user-select: none;
  }

  h1 { font-size: 2rem; letter-spacing: .15em; color: var(--accent); font-weight: 900; }

  .subtitle { font-size: .78rem; color: #445; }

  /* ── Checkpoint progress bar ── */
  .cp-bar { display: flex; align-items: center; gap: 0; }

  .cp-pip {
    width: 38px; height: 38px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem; font-weight: 900;
    background: #1a1a35; border: 2px solid #333360;
    color: #444470;
    transition: all .35s;
  }
  .cp-pip.done {
    background: #1a4a2a; border-color: #2a8a4a;
    color: #fff; box-shadow: 0 0 10px rgba(42,138,74,.5);
  }
  .cp-pip.active {
    background: var(--accent); border-color: #ff6080;
    color: #fff;
    animation: pipPulse 1.1s ease-in-out infinite;
  }
  .cp-dash {
    width: 22px; height: 3px; background: #2a2a50;
    transition: background .35s;
  }
  .cp-dash.done { background: #2a8a4a; }

  @keyframes pipPulse {
    0%,100% { box-shadow: 0 0 8px rgba(233,69,96,.5); }
    50%      { box-shadow: 0 0 18px rgba(233,69,96,.9); }
  }

  /* ── Grid wrap ── */
  .grid-wrap {
    position: relative;
    cursor: crosshair;
    /* exact px so SVG overlay aligns perfectly */
    width:  calc(8 * var(--stride) - var(--gap));
    height: calc(8 * var(--stride) - var(--gap));
  }

  #grid {
    display: grid;
    grid-template-columns: repeat(8, var(--sz));
    grid-template-rows:    repeat(8, var(--sz));
    gap: var(--gap);
    position: relative;
    z-index: 1;
  }

  /* ── Cell ── */
  .cell {
    border-radius: 10px;
    position: relative;
    overflow: hidden;
    background: var(--cell);
    border: 2px solid var(--border);
    transition: background .08s, transform .08s, box-shadow .08s;
  }

  .cell.start-glow {
    border-color: var(--accent);
    box-shadow: 0 0 14px rgba(233,69,96,.45);
  }
  .cell.in-path  { border-color: transparent !important; }
  .cell.tip-cell {
    z-index: 3;
    transform: scale(1.08) !important;
    box-shadow: 0 0 22px rgba(255,255,255,.45) !important;
  }
  .cell.hover-hint {
    border-color: rgba(255,255,255,.35) !important;
    background: #25254a !important;
    transform: scale(1.04);
  }

  /* checkpoint label — always visible */
  .cp-lbl {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.45rem; font-weight: 900;
    color: rgba(255,255,255,.12);
    pointer-events: none;
    transition: color .2s;
  }
  .cell.in-path  .cp-lbl { color: rgba(255,255,255,.92); }
  .cell.start-glow .cp-lbl { color: rgba(255,255,255,.65); }

  /* step counter */
  .step-lbl {
    position: absolute; bottom: 3px; left: 5px;
    font-size: 9px; font-weight: 700;
    color: rgba(255,255,255,.48);
    pointer-events: none;
  }

  /* ── SVG path overlay ── */
  #path-svg {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 2;
    overflow: visible;
  }

  /* ── Controls ── */
  .controls { display: flex; gap: .7rem; }

  button {
    padding: .48rem 1.25rem;
    border-radius: 8px; border: none;
    font-size: .88rem; font-weight: 700;
    letter-spacing: .04em;
    cursor: pointer;
    transition: transform .1s, filter .1s;
  }
  button:active { transform: scale(.94); }
  button:hover  { filter: brightness(1.18); }

  .btn-reset { background: var(--accent); color: #fff; }
  .btn-undo  { background: #22223a; color: #99a; border: 1px solid #3a3a60; }

  /* ── Status / stuck ── */
  .status {
    font-size: .8rem; color: #4a4a70;
    min-height: 1.1rem; text-align: center;
  }
  .stuck {
    font-size: .82rem; color: #e94560;
    min-height: 1rem; text-align: center;
    opacity: 0; transition: opacity .3s;
  }
  .stuck.show { opacity: 1; }

  /* ── Win overlay ── */
  #win-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.75);
    align-items: center; justify-content: center;
    z-index: 999;
  }
  #win-overlay.show { display: flex; }

  .win-box {
    background: #13132a;
    border: 2px solid #ffd700;
    border-radius: 18px;
    padding: 2.5rem 3.2rem;
    text-align: center;
    display: flex; flex-direction: column; gap: .9rem;
    box-shadow: 0 0 70px rgba(255,215,0,.25);
    animation: popIn .38s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes popIn {
    from { transform: scale(.45); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }
  .win-box h2 { font-size: 2.3rem; color: #ffd700; }
  .win-box p  { color: #778; font-size: .92rem; }
  .win-box button { background: #ffd700; color: #111; padding: .65rem 2rem; font-size: .95rem; margin: 0 auto; }

  /* ── Flash msg ── */
  #flash {
    position: fixed; top: 1.5rem; left: 50%; transform: translateX(-50%);
    background: #2a2a50; border: 1px solid #5a5a90;
    color: #ccd; padding: .5rem 1.2rem;
    border-radius: 8px; font-size: .83rem;
    pointer-events: none; z-index: 500;
    opacity: 0; transition: opacity .25s;
    white-space: nowrap;
  }
  #flash.show { opacity: 1; }
</style>
</head>
<body>

<h1>ZIP 344</h1>
<p class="subtitle">Draw a path from ① through every cell and end at ⑦</p>

<div class="cp-bar" id="cp-bar"></div>

<div class="grid-wrap">
  <div id="grid"></div>
  <svg id="path-svg"></svg>
</div>

<div class="controls">
  <button class="btn-undo"  id="btn-undo">↩ Undo</button>
  <button class="btn-reset" id="btn-reset">↺ Reset</button>
</div>

<div class="status" id="status">Click ① to start</div>
<div class="stuck"  id="stuck"></div>

<div id="win-overlay">
  <div class="win-box">
    <h2>🎉 Solved!</h2>
    <p>All 64 cells · all 7 checkpoints · path complete</p>
    <button id="btn-again">Play Again</button>
  </div>
</div>

<div id="flash"></div>

<script>
// ── Constants ──────────────────────────────────────────────────────────────
const ROWS = 8, COLS = 8, TOTAL = 64;
const SZ = 64, GAP = 4, STR = SZ + GAP;          // pixel stride

const CP = {                                        // checkpoints (0-indexed)
  '3,3':1, '2,2':2, '4,4':3,
  '2,5':4, '4,1':5, '6,0':6, '0,7':7
};
const SYM = ['','①','②','③','④','⑤','⑥','⑦'];

// ── DOM ────────────────────────────────────────────────────────────────────
const gridEl    = document.getElementById('grid');
const svgEl     = document.getElementById('path-svg');
const statusEl  = document.getElementById('status');
const stuckEl   = document.getElementById('stuck');
const cpBarEl   = document.getElementById('cp-bar');
const winEl     = document.getElementById('win-overlay');
const flashEl   = document.getElementById('flash');

let cells = [];          // cells[r][c] = <div>

// ── State ──────────────────────────────────────────────────────────────────
let path    = [];        // [{r,c}, …]
let pSet    = new Set(); // "r,c"
let started = false;
let won     = false;
let dragging= false;
let flashTimer = null;

// ── Helpers ────────────────────────────────────────────────────────────────
const k   = (r,c) => `${r},${c}`;
const adj = (r1,c1,r2,c2) => Math.abs(r1-r2)+Math.abs(c1-c2) === 1;

function center(r,c) { return { x: c*STR + SZ/2, y: r*STR + SZ/2 }; }

function hsl(idx) {
  const t   = idx / (TOTAL - 1);
  const hue = Math.round(210 - t * 170);
  const sat = Math.round(55  + t *  20);
  const lit = Math.round(28  + t *  14);
  return `hsl(${hue},${sat}%,${lit}%)`;
}

function nextNeeded() {
  let n = 1;
  for (const {r,c} of path) if (CP[k(r,c)] === n) n++;
  return n; // 8 = all done
}

function canEnter(r,c) {
  if (r<0||r>=ROWS||c<0||c>=COLS) return false;
  if (pSet.has(k(r,c))) return false;
  const cp = CP[k(r,c)];
  if (cp) {
    if (cp !== nextNeeded()) return false;
    // ⑦ only allowed as the very last (64th) cell
    if (cp === 7 && path.length !== TOTAL - 1) return false;
  }
  return true;
}

function flash(msg) {
  flashEl.textContent = msg;
  flashEl.classList.add('show');
  clearTimeout(flashTimer);
  flashTimer = setTimeout(() => flashEl.classList.remove('show'), 1800);
}

// ── Build grid ─────────────────────────────────────────────────────────────
function buildGrid() {
  gridEl.innerHTML = '';
  cells = [];

  const W = COLS*STR - GAP, H = ROWS*STR - GAP;
  svgEl.setAttribute('viewBox', `0 0 ${W} ${H}`);

  for (let r = 0; r < ROWS; r++) {
    cells[r] = [];
    for (let c = 0; c < COLS; c++) {
      const div = document.createElement('div');
      div.className = 'cell';
      div.dataset.r = r; div.dataset.c = c;

      const cp = CP[k(r,c)];
      if (cp) {
        const lbl = document.createElement('div');
        lbl.className = 'cp-lbl';
        lbl.textContent = SYM[cp];
        div.appendChild(lbl);
        if (cp === 1) div.classList.add('start-glow');
      }

      gridEl.appendChild(div);
      cells[r][c] = div;
    }
  }
}

function buildCpBar() {
  cpBarEl.innerHTML = '';
  for (let i = 1; i <= 7; i++) {
    if (i > 1) {
      const d = document.createElement('div');
      d.className = 'cp-dash'; d.id = `cd${i}`;
      cpBarEl.appendChild(d);
    }
    const p = document.createElement('div');
    p.className = 'cp-pip'; p.id = `cp${i}`;
    p.textContent = i;
    if (i === 1 && !started) p.classList.add('active');
    cpBarEl.appendChild(p);
  }
}

// ── Render ─────────────────────────────────────────────────────────────────
function render() {
  // reset cells
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const div = cells[r][c];
      const cp  = CP[k(r,c)];
      div.className = 'cell' + (cp===1 && !started ? ' start-glow' : '');
      div.style.background = '';
      div.querySelectorAll('.step-lbl').forEach(e => e.remove());
    }
  }

  // colour path
  path.forEach(({r,c}, i) => {
    const div = cells[r][c];
    div.classList.add('in-path');
    div.style.background = hsl(i);
    const sl = document.createElement('div');
    sl.className = 'step-lbl'; sl.textContent = i+1;
    div.appendChild(sl);
  });

  // tip
  if (path.length) {
    const {r,c} = path[path.length-1];
    cells[r][c].classList.add('tip-cell');
  }

  drawSVG();
  renderCpBar();
  renderStatus();
  renderStuck();
}

function drawSVG() {
  svgEl.innerHTML = '';
  if (path.length < 2) return;

  for (let i = 0; i < path.length - 1; i++) {
    const {x:x1,y:y1} = center(path[i].r,   path[i].c);
    const {x:x2,y:y2} = center(path[i+1].r, path[i+1].c);
    const t   = i / (TOTAL - 1);
    const hue = Math.round(210 - t * 170);

    // glow
    const glow = document.createElementNS('http://www.w3.org/2000/svg','line');
    glow.setAttribute('x1',x1); glow.setAttribute('y1',y1);
    glow.setAttribute('x2',x2); glow.setAttribute('y2',y2);
    glow.setAttribute('stroke',`hsla(${hue},65%,68%,.18)`);
    glow.setAttribute('stroke-width',26);
    glow.setAttribute('stroke-linecap','round');
    svgEl.appendChild(glow);

    // core
    const ln = document.createElementNS('http://www.w3.org/2000/svg','line');
    ln.setAttribute('x1',x1); ln.setAttribute('y1',y1);
    ln.setAttribute('x2',x2); ln.setAttribute('y2',y2);
    ln.setAttribute('stroke',`hsla(${hue},70%,62%,.55)`);
    ln.setAttribute('stroke-width',10);
    ln.setAttribute('stroke-linecap','round');
    svgEl.appendChild(ln);
  }
}

function renderCpBar() {
  const need = nextNeeded();
  for (let i = 1; i <= 7; i++) {
    const pip  = document.getElementById(`cp${i}`);
    pip.className = 'cp-pip';
    if (i < need)               pip.classList.add('done');
    else if (i === need && started) pip.classList.add('active');
    if (i > 1) {
      const dash = document.getElementById(`cd${i}`);
      dash.className = 'cp-dash' + (i < need ? ' done' : '');
    }
  }
}

function renderStatus() {
  if (!started) { statusEl.textContent = 'Click ① to start'; return; }
  if (won)      { statusEl.textContent = ''; return; }
  const need = nextNeeded();
  const rem  = TOTAL - path.length;
  statusEl.textContent = need <= 7
    ? `Step ${path.length} · next ${SYM[need]} · ${rem} cells left`
    : `Step ${path.length} · ${rem} cells left — end at ${SYM[7]}!`;
}

function renderStuck() {
  if (!started || won || !path.length) { stuckEl.classList.remove('show'); return; }
  const {r,c} = path[path.length-1];
  const moves = [[-1,0],[1,0],[0,-1],[0,1]].some(([dr,dc]) => canEnter(r+dr,c+dc));
  if (!moves && path.length < TOTAL) {
    stuckEl.textContent = 'Dead end — tap ↩ Undo to backtrack';
    stuckEl.classList.add('show');
  } else {
    stuckEl.classList.remove('show');
  }
}

// ── Game actions ───────────────────────────────────────────────────────────
function startPath(r,c) {
  if (CP[k(r,c)] !== 1) return;
  path = [{r,c}]; pSet = new Set([k(r,c)]);
  started = true; won = false;
  render();
}

function extend(r,c) {
  if (!started || won) return;
  const tip = path[path.length-1];
  if (tip.r===r && tip.c===c) return;

  // backtrack if cell already in path and adjacent to tip
  if (pSet.has(k(r,c))) {
    if (adj(tip.r,tip.c,r,c)) {
      // find index and truncate
      const idx = path.findIndex(p => p.r===r && p.c===c);
      const removed = path.splice(idx+1);
      removed.forEach(p => pSet.delete(k(p.r,p.c)));
      render();
    }
    return;
  }

  if (!adj(tip.r,tip.c,r,c)) return;

  if (!canEnter(r,c)) {
    // tell player why ⑦ is blocked
    if (CP[k(r,c)]===7 && path.length < TOTAL-1)
      flash(`⑦ must be your last cell — ${TOTAL-1-path.length} cells still uncovered`);
    return;
  }

  path.push({r,c}); pSet.add(k(r,c));

  if (path.length === TOTAL) {
    won = true; render();
    setTimeout(() => winEl.classList.add('show'), 380);
    return;
  }
  render();
}

function undo() {
  if (!started || path.length <= 1) return;
  pSet.delete(k(path[path.length-1].r, path[path.length-1].c));
  path.pop();
  render();
}

function reset() {
  path=[]; pSet=new Set(); started=false; won=false; dragging=false;
  winEl.classList.remove('show');
  svgEl.innerHTML='';
  buildGrid(); buildCpBar(); renderStatus();
  stuckEl.classList.remove('show');
}

// ── Input ──────────────────────────────────────────────────────────────────
function cellAt(el) {
  const c = el && el.closest ? el.closest('.cell') : null;
  return c ? {r:+c.dataset.r, c:+c.dataset.c} : null;
}
function cellAtPoint(x,y) { return cellAt(document.elementFromPoint(x,y)); }

// Mouse
gridEl.addEventListener('mousedown', e => {
  e.preventDefault(); dragging = true;
  const cell = cellAt(e.target);
  if (!cell) return;
  if (!started) startPath(cell.r, cell.c);
  else          extend(cell.r, cell.c);
});
gridEl.addEventListener('mousemove', e => {
  if (!dragging || !started) return;
  const cell = cellAt(e.target);
  if (cell) extend(cell.r, cell.c);
});
document.addEventListener('mouseup', () => dragging = false);

// Touch
gridEl.addEventListener('touchstart', e => {
  e.preventDefault(); dragging = true;
  const t = e.touches[0];
  const cell = cellAtPoint(t.clientX, t.clientY);
  if (!cell) return;
  if (!started) startPath(cell.r, cell.c);
  else          extend(cell.r, cell.c);
}, {passive:false});
gridEl.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!dragging || !started) return;
  const t = e.touches[0];
  const cell = cellAtPoint(t.clientX, t.clientY);
  if (cell) extend(cell.r, cell.c);
}, {passive:false});
document.addEventListener('touchend', () => dragging = false);

// Buttons
document.getElementById('btn-undo') .addEventListener('click', undo);
document.getElementById('btn-reset').addEventListener('click', reset);
document.getElementById('btn-again').addEventListener('click', reset);

// ── Init ───────────────────────────────────────────────────────────────────
reset();
</script>
</body>
</html>
